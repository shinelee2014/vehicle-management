server {
  listen 80;
  server_name _;
  client_max_body_size 20M;

  root /usr/share/nginx/html;
  index index.html;

  # API reverse proxy - handles trailing slash automatically
  location /api/ {
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,Fetch-Asset,Content-Type,Authorization,X-Requested-With,accept,origin,cache-control';
      add_header 'Access-Control-Allow-Credentials' 'true';
      add_header 'Access-Control-Max-Age' 1728000;
      add_header 'Content-Type' 'text/plain';
      add_header 'Content-Length' 0;
      return 204;
    }

    # Rewrite URLs without trailing slash to add one. This avoids
    # the FastAPI 307 redirect which breaks CORS in browsers.
    # Matches: /api/v1/<single-segment> (no trailing /)
    # Does NOT match: /api/v1/posts/ (already has /) or /api/v1/posts/123 (has more segments)
    if ($uri ~ "^/api/v1/[^/]+$") {
      rewrite ^(.*)$ $1/ last;
    }

    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /photos/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # index.html 不缓存（每次都拿新版本，避免菜单/路由变更后浏览器继续用旧版）
  location = / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files /index.html =404;
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
